<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>TikTok Ads Quiz</title>
  <style>

:root{
  --primary-blue:#0b1f38;
  --secondary-blue:#16365d;
  --gold:#c8a84e;
  --light-bg:#f0f4f8;
  --card-bg:#ffffff;
  --border-color:#d7e1ec;
  --text-dark:#0b1f38;
  --text-muted:#64748b;
  --correct-bg:#d1fae5;
  --correct-border:#10b981;
  --incorrect-bg:#fee2e2;
  --incorrect-border:#ef4444;
  --shadow-md:0 12px 30px rgba(11,31,56,.12);
}
*{box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:var(--light-bg);
  color:var(--text-dark);
  min-height:100vh;
  margin:0;
}
.quiz-header{
  background:var(--primary-blue);
  color:#fff;
  border-bottom:4px solid var(--gold);
  padding:1.15rem 1.5rem;
  box-shadow:0 8px 24px rgba(11,31,56,.13);
}
.quiz-header-inner{
  width:min(1200px,calc(100% - 2rem));
  margin:0 auto;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:1rem;
}
.quiz-header h1{
  font-size:clamp(2rem,3.8vw,2.8rem);
  line-height:1.08;
  margin:0;
  font-weight:850;
  letter-spacing:-.02em;
}
.back-link-header{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
  color:#fff;
  background:rgba(255,255,255,.10);
  border:1px solid rgba(255,255,255,.28);
  padding:.82rem 1rem;
  border-radius:9px;
  font-weight:800;
  white-space:nowrap;
}
.back-link-header:hover{background:rgba(255,255,255,.18)}
.quiz-main{
  min-height:calc(100vh - 98px);
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding:3rem 1.25rem;
}
.quiz-container{
  background-color:#fff;
  border-radius:12px;
  box-shadow:var(--shadow-md);
  width:100%;
  max-width:800px;
  padding:40px;
  box-sizing:border-box;
}
.quiz-container h1{display:none}
.progress{
  text-align:center;
  color:var(--text-muted);
  font-size:15px;
  margin-bottom:30px;
  font-weight:700;
}
.question{
  font-size:20px;
  font-weight:750;
  margin-bottom:25px;
  line-height:1.5;
  color:var(--text-dark);
}
.options{
  display:flex;
  flex-direction:column;
  gap:12px;
}
.option,
.option-btn{
  background-color:#f8fafc;
  border:2px solid var(--border-color);
  border-radius:8px;
  padding:16px;
  font-size:16px;
  cursor:pointer;
  transition:all .2s ease;
  text-align:left;
  font-weight:500;
  color:#48617d;
  line-height:1.45;
}
.option:hover:not(:disabled),
.option-btn:hover:not(:disabled){
  background-color:#eef4fa;
  border-color:#b8c8d8;
}
.option.correct,
.option-btn.correct{
  background-color:var(--correct-bg)!important;
  border-color:var(--correct-border)!important;
  color:#065f46!important;
  font-weight:700;
}
.option.incorrect,
.option-btn.incorrect{
  background-color:var(--incorrect-bg)!important;
  border-color:var(--incorrect-border)!important;
  color:#991b1b!important;
}
.option:disabled,
.option-btn:disabled{cursor:default}
.feedback{
  margin-top:25px;
  font-size:16px;
  text-align:left;
  min-height:24px;
  padding:15px;
  border-radius:8px;
  display:none;
  line-height:1.5;
}
.feedback.success{
  background-color:var(--correct-bg);
  color:#065f46;
  border-left:5px solid var(--correct-border);
}
.feedback.error{
  background-color:var(--incorrect-bg);
  color:#991b1b;
  border-left:5px solid var(--incorrect-border);
}
.btn-container,
.controls{
  display:flex;
  justify-content:flex-end;
  margin-top:30px;
}
button.next-btn,
.next-btn{
  background-color:var(--secondary-blue);
  color:#fff;
  border:none;
  border-radius:8px;
  padding:14px 28px;
  font-size:16px;
  font-weight:800;
  cursor:pointer;
  transition:background-color .2s;
  display:none;
}
button.next-btn:hover,
.next-btn:hover{background-color:var(--primary-blue)}
.result-container,
.result-screen{
  text-align:center;
  display:none;
}
.result-container h2,
.result-screen h2{
  color:var(--primary-blue);
  font-size:30px;
  margin-bottom:20px;
}
.result-container p,
.result-screen p{
  font-size:20px;
  color:#4a5568;
  margin-bottom:30px;
}
.score-circle{
  width:150px;
  height:150px;
  border-radius:50%;
  background:var(--primary-blue);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:46px;
  font-weight:850;
  margin:0 auto 24px auto;
}
.restart-btn{
  background-color:var(--secondary-blue);
  color:white;
  border:none;
  border-radius:8px;
  padding:14px 28px;
  font-size:16px;
  font-weight:800;
  cursor:pointer;
}
.restart-btn:hover{background-color:var(--primary-blue)}
@media(max-width:760px){
  .quiz-header-inner{
    width:100%;
    flex-direction:column;
    align-items:stretch;
  }
  .back-link-header{width:100%}
  .quiz-container{padding:28px 20px}
}

.placeholder{
  text-align:center;
  color:#64748b;
}
.placeholder h2{
  color:#0b1f38;
  margin:0 0 .7rem;
}
.status{
  display:inline-flex;
  padding:.28rem .7rem;
  border-radius:999px;
  background:#fef3c7;
  color:#92400e;
  font-weight:800;
  margin-bottom:1rem;
}
  </style>
</head>
<body>
<header class="quiz-header">
  <div class="quiz-header-inner">
    <h1>TikTok Ads Quiz</h1>
    <a class="back-link-header" href="index.html">← Zurück zur Übersicht</a>
  </div>
</header>
<main class="quiz-main">
  <div class="quiz-container placeholder">
    <span class="status">Im Aufbau</span>
    <h2>Dieses Quiz ist vorbereitet.</h2>
    <p>Sobald die Fragen fertig sind, wird diese Datei ersetzt.</p>
  </div>
</main>
</body>
</html>
